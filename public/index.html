<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>session-forge hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">S</span>
      session-forge hub
    </a>
    <button class="navbar-hamburger" aria-label="Toggle navigation">&#9776;</button>
    <div class="navbar-links">
      <a href="index.html">Overview</a>
      <a href="agents.html">Agents</a>
      <a href="activity.html">Activity</a>
      <a href="search.html">Search</a>
      <a href="reports.html">Reports</a>
      <a href="sync.html">Sync</a>
      <a href="security.html">Security</a>
      <a href="donate.html">Donate</a>
    </div>
  </div>
</nav>

<div class="page-container fade-in">
  <div class="page-header">
    <h1 id="hub-name">session-forge hub</h1>
    <p class="subtitle">Overview of all agent activity across your network</p>
  </div>

  <!-- Stats Row -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-icon">&#8987;</div><div class="stat-info"><span class="stat-value">--</span><span class="stat-label">Loading...</span></div></div>
  </div>

  <!-- Agents Grid -->
  <div class="flex items-center justify-between mb-md">
    <h2>Active Agents</h2>
    <a href="agents.html" class="btn btn-ghost btn-sm">View All &rarr;</a>
  </div>
  <div class="agents-grid" id="agents-grid">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- Recent Activity -->
  <div class="flex items-center justify-between mb-md mt-lg">
    <h2>Recent Activity</h2>
    <a href="activity.html" class="btn btn-ghost btn-sm">Full Feed &rarr;</a>
  </div>
  <div class="activity-feed" id="activity-feed">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/components.js"></script>
<script>
(function () {
  'use strict';

  var SFH = window.SFH;
  var C = SFH.components;

  if (!SFH.initAuth()) return;

  loadOverview();
  loadActivity();

  async function loadOverview() {
    try {
      var data = await SFH.apiFetch('/dashboard/overview');

      // Update hub name
      if (data.hub_name) {
        document.getElementById('hub-name').textContent = data.hub_name;
        document.title = data.hub_name;
      }

      // Stats row
      var statsHtml = '';
      statsHtml += C.createStatsCard('Total Agents', data.agents.total, '&#129302;');
      statsHtml += C.createStatsCard('Active Now', data.agents.online_now, '&#128994;');
      statsHtml += C.createStatsCard('Total Decisions', data.totals.decisions, '&#9878;');
      statsHtml += C.createStatsCard('Dead Ends Logged', data.totals.dead_ends, '&#9888;');
      document.getElementById('stats-row').innerHTML = statsHtml;

      // Agent cards
      var agentsEl = document.getElementById('agents-grid');
      if (data.agents_list && data.agents_list.length > 0) {
        agentsEl.innerHTML = data.agents_list.map(function (agent) {
          return C.createAgentCard(agent);
        }).join('');
      } else {
        agentsEl.innerHTML = C.createEmptyState('&#129302;', 'No agents registered', 'Register your first agent on the Agents page to get started.');
      }
    } catch (err) {
      console.error('Failed to load overview:', err);
      document.getElementById('stats-row').innerHTML = '<div class="alert alert-error w-full">Failed to load overview: ' + SFH.escapeHtml(err.message) + '</div>';
    }
  }

  async function loadActivity() {
    try {
      var data = await SFH.apiFetch('/dashboard/activity');

      var feedEl = document.getElementById('activity-feed');
      if (data.events && data.events.length > 0) {
        var eventsHtml = data.events.slice(0, 20).map(function (event) {
          return C.createEventCard(event);
        }).join('');
        feedEl.innerHTML = eventsHtml;
      } else {
        feedEl.innerHTML = C.createEmptyState('&#128203;', 'No activity yet', 'Activity will appear here as agents report checkpoints, decisions, and dead ends.');
      }
    } catch (err) {
      console.error('Failed to load activity:', err);
      document.getElementById('activity-feed').innerHTML = '<div class="alert alert-error">Failed to load activity feed.</div>';
    }
  }
})();
</script>

</body>
</html>
