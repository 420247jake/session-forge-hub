<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Feed - session-forge hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">S</span>
      session-forge hub
    </a>
    <button class="navbar-hamburger" aria-label="Toggle navigation">&#9776;</button>
    <div class="navbar-links">
      <a href="index.html">Overview</a>
      <a href="agents.html">Agents</a>
      <a href="activity.html">Activity</a>
      <a href="search.html">Search</a>
      <a href="reports.html">Reports</a>
      <a href="sync.html">Sync</a>
      <a href="security.html">Security</a>
      <a href="donate.html">Donate</a>
    </div>
  </div>
</nav>

<div class="page-container fade-in">
  <div class="page-header">
    <h1>Live Activity Feed</h1>
    <p class="subtitle">Real-time events from all agents across your network <span id="auto-refresh-indicator" class="text-sm text-muted">(auto-refreshes every 15s)</span></p>
  </div>

  <!-- Filter Buttons -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="checkpoint">Checkpoints</button>
    <button class="filter-btn" data-filter="decision">Decisions</button>
    <button class="filter-btn" data-filter="dead_end">Dead Ends</button>
    <button class="filter-btn" data-filter="journal">Journal</button>
  </div>

  <!-- Activity Feed -->
  <div class="activity-feed" id="activity-feed">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/components.js"></script>
<script>
(function () {
  'use strict';

  var SFH = window.SFH;
  var C = SFH.components;

  if (!SFH.initAuth()) return;

  var allEvents = [];
  var currentFilter = 'all';
  var refreshInterval = null;

  // Filter buttons
  document.getElementById('filter-bar').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;

    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');

    currentFilter = btn.getAttribute('data-filter');
    renderEvents();
  });

  loadActivity();

  // Auto-refresh every 15 seconds
  refreshInterval = setInterval(function () {
    loadActivity(true);
  }, 15000);

  async function loadActivity(silent) {
    var feedEl = document.getElementById('activity-feed');
    if (!silent) {
      feedEl.innerHTML = C.createLoading();
    }

    try {
      var data = await SFH.apiFetch('/dashboard/activity');
      allEvents = data.events || [];
      renderEvents();

      // Flash the indicator on refresh
      if (silent) {
        var indicator = document.getElementById('auto-refresh-indicator');
        indicator.style.color = 'var(--color-green)';
        indicator.textContent = '(updated ' + new Date().toLocaleTimeString() + ')';
        setTimeout(function () {
          indicator.style.color = '';
          indicator.textContent = '(auto-refreshes every 15s)';
        }, 3000);
      }
    } catch (err) {
      if (!silent) {
        feedEl.innerHTML = '<div class="alert alert-error">Failed to load activity: ' + SFH.escapeHtml(err.message) + '</div>';
      }
    }
  }

  function renderEvents() {
    var feedEl = document.getElementById('activity-feed');
    var filtered = allEvents;

    if (currentFilter !== 'all') {
      filtered = allEvents.filter(function (e) { return e.type === currentFilter; });
    }

    if (filtered.length === 0) {
      var filterName = currentFilter === 'all' ? '' : currentFilter.replace('_', ' ');
      feedEl.innerHTML = C.createEmptyState(
        '&#128203;',
        'No ' + filterName + ' events',
        currentFilter === 'all'
          ? 'Activity will appear here as agents report data.'
          : 'No events of this type have been recorded yet.'
      );
      return;
    }

    feedEl.innerHTML = filtered.map(function (event) {
      return C.createEventCard(event);
    }).join('');
  }

  // Cleanup interval on page unload
  window.addEventListener('beforeunload', function () {
    if (refreshInterval) clearInterval(refreshInterval);
  });
})();
</script>

</body>
</html>
